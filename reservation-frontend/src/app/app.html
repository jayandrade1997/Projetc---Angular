<main class="app-shell">
  <header class="hero">
    <span class="hero-badge">Insignia Premium Spa</span>
    <h1>Servicio de Reservas de SPA</h1>
    <div class="hero-line">
      <p>{{ name() }}, gestiona tus reservas con una experiencia moderna y clara.</p>
      <button class="secondary-button" type="button" (click)="changeName()">Cambiar nombre</button>
    </div>
    <p class="hero-description">Reserva en el mejor SPA de Colombia y vive una experiencia de bienestar de primer nivel.</p>
  </header>

  <nav class="menu-links">
    <a [routerLink]="['/reservas/new']" routerLinkActive="active-link" class="menu-button">Nueva reserva</a>
    <a [routerLink]="['/reservas']" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }" class="menu-button">Ver reservas</a>
  </nav>

  <section class="content-card">
    <router-outlet></router-outlet>
  </section>
</main>
